name: containers

on:
  push:
    branches: [main]
    paths:
      - "oc-base/**"
      - "oc-node/**"
      - "oc-python/**"
      - ".github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  check:
    name: Check upstream digest
    runs-on: ubuntu-latest

    outputs:
      update_needed: ${{ steps.compare.outputs.update_needed }}

    steps:
      - uses: actions/checkout@v7

      - name: Restore digest cache
        uses: actions/cache/restore@v6
        with:
          path: .opencode_digest
          key: opencode-digest

      - name: Pull remote digest
        id: pull
        run: |
          REMOTE_DIGEST=$(docker manifest inspect ghcr.io/anomalyco/opencode:latest \
            | jq -r '.manifests[].digest' \
            | head -n1)

          echo "remote_digest=$REMOTE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Compare digest
        id: compare
        run: |
          PREV_DIGEST=""

          if [ -f .opencode_digest ]; then
            PREV_DIGEST=$(cat .opencode_digest)
          fi

          if [ "$PREV_DIGEST" = "${{ steps.pull.outputs.remote_digest }}" ]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.pull.outputs.remote_digest }}" > .opencode_digest
          fi

      - name: Save digest cache
        if: steps.compare.outputs.update_needed == 'true'
        uses: actions/cache/save@v6
        with:
          path: .opencode_digest
          key: opencode-digest

  build:
    name: Build (${{ matrix.dir }})
    needs: check
    if: needs.check.outputs.update_needed == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dir:
          - oc-base
          - oc-node
          - oc-python

    steps:
      - uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        run: |
          cd "${{ matrix.dir }}"

          docker buildx bake \
            --allow=fs.read=.. \
            -f compose.yaml \
            -f compose.override.yaml \
            --set '*.platform=linux/amd64,linux/arm64' \
            --push

      - name: Verify image
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        run: |
          docker buildx imagetools inspect \
            "${IMAGE_PREFIX}/agent/${{ matrix.dir }}:latest"

  skipped:
    name: Skip
    needs: check
    if: needs.check.outputs.update_needed != 'true'
    runs-on: ubuntu-latest

    steps:
      - run: echo "🚫 No changes detected, build skipped."
