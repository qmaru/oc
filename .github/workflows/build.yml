name: containers

on:
  push:
    branches: [main]
    paths:
      - "oc-base/**"
      - "oc-node/**"
      - "oc-python/**"
      - ".github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dir:
          - oc-base
          - oc-node
          - oc-python

    steps:
      - name: check out
        uses: actions/checkout@v6

      - name: restore digest cache
        id: restore
        uses: actions/cache@v6
        with:
          path: .opencode_digest
          key: opencode-digest-${{ matrix.dir }}

      - name: pull remote digest
        id: pull_digest
        run: |
          REMOTE_DIGEST=$(docker manifest inspect ghcr.io/anomalyco/opencode:latest | jq -r '.manifests[].digest' | head -n 1)
          echo "remote_digest=$REMOTE_DIGEST" >> $GITHUB_OUTPUT

      - name: compare digest
        id: compare
        run: |
          PREV_DIGEST=""
          if [ -f ".opencode_digest" ]; then
            PREV_DIGEST=$(cat .opencode_digest)
          fi

          REMOTE_DIGEST="${{ steps.pull_digest.outputs.remote_digest }}"

          if [ "$PREV_DIGEST" = "$REMOTE_DIGEST" ]; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "$REMOTE_DIGEST" > .opencode_digest
          fi

      - name: login to Github Registry
        uses: docker/login-action@v4
        if: steps.compare.outputs.update_needed == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup QEMU
        uses: docker/setup-qemu-action@v4
        if: steps.compare.outputs.update_needed == 'true'

      - name: setup Buildx
        uses: docker/setup-buildx-action@v4
        if: steps.compare.outputs.update_needed == 'true'

      - name: build and push
        if: steps.compare.outputs.update_needed == 'true'
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        run: |
          cd ${{ matrix.dir }} && \
          docker buildx bake \
            --allow=fs.read=.. \
            -f compose.yaml \
            -f compose.override.yaml \
            --set '*.platform=linux/amd64,linux/arm64' \
            --push

      - name: verify image
        if: steps.compare.outputs.update_needed == 'true'
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        run: |
          docker buildx imagetools inspect \
            ${IMAGE_PREFIX}/agent/${{ matrix.dir }}:latest

      - name: save digest cache
        if: steps.compare.outputs.update_needed == 'true'
        uses: actions/cache@v6
        with:
          path: .opencode_digest
          key: opencode-digest-${{ matrix.dir }}

      - name: show update status
        run: |
          if [[ "${{ steps.compare.outputs.update_needed }}" == "true" ]]; then
            echo "✅ oc image updated and pushed!"
          else
            echo "🚫 no changes detected, build skipped."
          fi
